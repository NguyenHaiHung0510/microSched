# fly.toml app configuration file generated for microsched on 2026-07-20T20:57:53+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'microsched'
primary_region = 'sin'

[build]
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # PHẢI là /api/healthz (liveness), TUYỆT ĐỐI KHÔNG đổi sang /api/readyz.
  # readyz chạy SQL; nhịp 30 giây ở đây ngắn hơn cửa sổ idle 5 phút của Neon nên
  # sẽ giữ DB thức 24/7 → 6 CU-hrs/ngày → hết 100 CU-hrs free trong ~17 ngày →
  # Neon treo compute tới kỳ sau (mất DB, không phải mất tiền). Đó chính là lỗi
  # đã xảy ra 2026-07-21, xem docstring của backend/app/web/routers/health.py.
  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/api/healthz'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
