# Quyết định + lý do cho MỌI giá trị dưới đây: docs/architecture-brief.md §5.
# File này bị `fly launch`/`fly deploy` sinh lại và XOÁ COMMENT (đã xảy ra 23/07)
# nên KHÔNG ghi lý do ở đây — ghi ở §5. Giá trị nhạy (min_machines_running=0,
# path=/api/healthz) giải thích tại đó; sửa file này thì đọc §5 trước.

app = 'microsched'
primary_region = 'sin'

[env]
  APP_ENV = 'production'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/healthz'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
