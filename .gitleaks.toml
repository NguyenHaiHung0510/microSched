title = "microSched — extend gitleaks default config"

# Lý do: rule mặc định của gitleaks không có pattern cho connection string DB
# (postgresql://user:pass@host...). Với dự án này, connection string Neon
# CHÍNH LÀ secret số một (xem docs/devops-brief.md §3). useDefault = true
# giữ nguyên toàn bộ rule mặc định, hai rule dưới đây chỉ BỔ SUNG.
[extend]
useDefault = true

# Bắt URI có nhúng credential thật cho các DB driver dự án có thể dùng.
# Điều kiện "password trông thật" = độ dài tối thiểu + có chứa chữ số,
# để KHÔNG báo nhầm với placeholder kiểu "user:password@host" hay
# "postgres://localhost/db" (không có password) hay driver string trơn
# như "postgresql+asyncpg://" (schema-physical-brief.md §2).
[[rules]]
id = "microsched-db-connection-string"
description = "Database connection URI (postgres/mysql/mongodb/redis) kèm user:password trông thật"
regex = '''(?i)(?:postgres(?:ql)?(?:\+[a-z0-9]+)?|mysql(?:\+[a-z0-9]+)?|mongodb(?:\+srv)?|rediss?):\/\/[A-Za-z0-9_.\-]{1,64}:[A-Za-z0-9_\-]{4,}[0-9][A-Za-z0-9_\-]{2,}@[A-Za-z0-9.\-]{1,255}'''
keywords = ["postgres", "postgresql", "mysql", "mongodb", "redis"]
tags = ["database", "connection-string"]

# Biến môi trường dễ bị dán nhầm giá trị thật lúc debug/copy log.
# Cùng điều kiện "trông thật": có chữ số + đủ dài, để không báo nhầm
# với placeholder kiểu PGPASSWORD=your_password_here.
#
# 📝 2026-07-24 (008d, Mục 2): thêm 5 biến quyền-CAO nhất dự án. Trước đó rule
# này chỉ che DATABASE_URL/PGPASSWORD (credential ÍT quyền nhất — CRUD-only),
# còn NEON_OWNER_URL/NEON_MIGRATOR_URL (đổi schema, tạo role — ⛔ không bao giờ
# lên Fly, backend/.env.example) chỉ còn rule connection-string che, mà rule đó
# đòi mật khẩu chứa chữ số đúng vị trí ⇒ URL Neon có mật khẩu không-chữ-số lọt
# cả hai. Bất đối xứng đúng chiều nguy hiểm. Thêm cả ENCRYPTION_MASTER_KEY (mất
# = mất mọi cột 🔐), CRON_TOKEN, OAUTH_STATE_SECRET. GIỮ NGUYÊN điều kiện
# "trông thật" (có chữ số) — nới ra sẽ báo nhầm .env.example và dạy bỏ qua hook.
[[rules]]
id = "microsched-db-env-var-value"
description = "Secret env-var quyền cao (DB URL / master key / token) gán giá trị trông thật (không phải placeholder)"
regex = '''(?i)(DATABASE_URL|PGPASSWORD|NEON_OWNER_URL|NEON_MIGRATOR_URL|ENCRYPTION_MASTER_KEY|CRON_TOKEN|OAUTH_STATE_SECRET)\s*=\s*['"]?[A-Za-z0-9_\-:/.@]{4,}[0-9][A-Za-z0-9_\-:/.@]{2,}['"]?'''
keywords = ["DATABASE_URL", "PGPASSWORD", "NEON_OWNER_URL", "NEON_MIGRATOR_URL", "ENCRYPTION_MASTER_KEY", "CRON_TOKEN", "OAUTH_STATE_SECRET"]
tags = ["database", "env-var"]
